##
## Production server config (wip)
## You probably want to run:
## docker-compose -f docker-compose.yml -f docker-compose.infogami-local.yml -f docker-compose.production.yml up -d
##

version: "3.1"
services:
  affiliate-server:
    restart: always
    hostname: "$HOSTNAME"
    environment:
      - AFFILIATE_CONFIG=openlibrary.yml
      - PYENV_VERSION=3.8.6
    image: oldev:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.oldev
    command: docker/ol-affiliate-server-start.sh
    ports:
      - 31337:31337
    volumes:
      -  /Users/cclauss/Python/itinerant_futurizer/archive.org/olsystem/etc/openlibrary.yml:/openlibrary.yml
    networks:
      - webnet

secrets:
    petabox_seed:
      file: /opt/.petabox/seed

    # SSL-related secrets
    ssl_certificate:
      file: /opt/.petabox/openlibrary.org.combined.crt
    ssl_certificate_key:
      file: /opt/.petabox/openlibrary.org.nopassword.key
volumes:
    infobase-writelog:
    infobase-errorlog:

